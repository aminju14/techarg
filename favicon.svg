<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#800000"/>
      <stop offset="1" stop-color="#5C0000"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Italic accent bar (white, skewed) -->
  <rect x="7" y="8" width="3.2" height="16" rx="1.4" fill="rgba(255,255,255,0.55)" transform="skewX(-11)"/>
  <!-- Letter T bold white italic -->
  <text x="12" y="24" font-family="'Sora','Arial Black',sans-serif" font-weight="800" font-size="17" fill="#ffffff" transform="skewX(-6)" letter-spacing="-0.5">T</text>
</svg>
